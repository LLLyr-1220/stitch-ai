<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>史迪仔 AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.chat-container { width: 100%; max-width: 480px; height: 100vh; background: white; display: flex; flex-direction: column; }
.header { background: #07c160; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }
.header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { display: flex; gap: 8px; max-width: 85%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
.msg.bot .bubble { background: #f0f2f5; border-radius: 4px 18px 18px 18px; }
.msg.user .bubble { background: #07c160; color: white; border-radius: 18px 4px 18px 18px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: #07c160; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.input-area { padding: 12px; border-top: 1px solid #eee; display: flex; gap: 8px; }
input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
button { padding: 10px 20px; background: #07c160; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
.typing { color: #999; font-size: 13px; padding: 0 4px; }
</style>
</head>
<body>
<div class="chat-container">
<div class="header">
🧬 史迪仔 AI
<p>我的AI分身，有事找我先找它</p>
</div>
<div class="messages" id="messages">
<div class="msg bot">
<div class="avatar">🧬</div>
<div class="bubble">哟，来了。我是史迪仔的AI分身，有什么事直说，别废话 😄</div>
</div>
</div>
<div class="input-area">
<input type="text" id="input" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendMsg()">
<button onclick="sendMsg()">发送</button>
</div>
</div>
<script>
async function sendMsg() {
const input = document.getElementById('input');
const text = input.value.trim();
if (!text) return;
input.value = '';
addMsg(text, 'user');
const typing = addMsg('...', 'bot', true);
try {
const res = await fetch('/api/chat', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({message: text})
});
const data = await res.json();
typing.remove();
addMsg(data.reply, 'bot');
} catch(e) {
typing.remove();
addMsg('网络出问题了，稍后再试', 'bot');
}
}
function addMsg(text, role, isTyping=false) {
const msgs = document.getElementById('messages');
const div = document.createElement('div');
div.className = `msg ${role}`;
div.innerHTML = role === 'bot'
? `<div class="avatar">🧬</div><div class="bubble ${isTyping?'typing':''}">${text}</div>`
: `<div class="bubble">${text}</div>`;
msgs.appendChild(div);
msgs.scrollTop = msgs.scrollHeight;
return div;
}
</script>
</body>
</html>
